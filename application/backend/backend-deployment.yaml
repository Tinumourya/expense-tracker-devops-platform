apiVersion: apps/v1
kind: Deployment
metadata:
  name: expense-backend
  namespace: expense-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: expense-backend
  template:
    metadata:
      labels:
        app: expense-backend
    spec:
      containers:
      - name: expense-backend
        image: tinu0712/expense-backend:v1
        imagePullPolicy: Always
        ports:
        - containerPort: 4000
        env:
        - name: MONGO_URI
          value: "mongodb+srv://deadlock:asrasr123@cluster0.mnhdnpb.mongodb.net/?retryWrites=true&w=majority"
